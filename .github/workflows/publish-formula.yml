name: publish formula

on:
  workflow_call:
    inputs:
      formula:
        required: true
        type: string
      repository:
        required: false
        type: string
        default: ""
      ref:
        required: false
        type: string
        default: ""
      version:
        required: false
        type: string
        default: ""
      template-path:
        required: false
        type: string
        default: ".github/homebrew/formula.rb.erb"
    secrets:
      token:
        required: false
      deploy_key:
        required: false

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - name: select credential
        id: credential
        run: |
          if [ -n "$TOKEN" ] && [ -n "$DEPLOY_KEY" ]; then
            echo "::error::Provide either token or deploy_key, not both."
            exit 1
          fi
          if [ -n "$DEPLOY_KEY" ]; then
            echo "mode=deploy_key" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "$TOKEN" ]; then
            echo "mode=token" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::error::Provide token or deploy_key to publish the formula."
          exit 1
        env:
          TOKEN: ${{ secrets.token }}
          DEPLOY_KEY: ${{ secrets.deploy_key }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: steps.credential.outputs.mode == 'token'
        with:
          repository: jinyongp/homebrew-tap
          token: ${{ secrets.token }}
          path: tap
          fetch-depth: 0
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: steps.credential.outputs.mode == 'deploy_key'
        with:
          repository: jinyongp/homebrew-tap
          ssh-key: ${{ secrets.deploy_key }}
          path: tap
          fetch-depth: 0
      - name: resolve source inputs
        id: source
        run: bash tap/.github/workflows/scripts/resolve-source-inputs.sh
        env:
          INPUT_REPOSITORY: ${{ inputs.repository }}
          INPUT_REF: ${{ inputs.ref }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ steps.source.outputs.repository }}
          ref: ${{ steps.source.outputs.ref }}
          path: source
          fetch-depth: 0
      - name: generate formula
        id: formula
        uses: ./tap/actions/publish/formula
        with:
          tap-path: tap
          source-path: source
          formula: ${{ inputs.formula }}
          repository: ${{ steps.source.outputs.repository }}
          ref: ${{ steps.source.outputs.ref }}
          version: ${{ inputs.version }}
          template-path: ${{ inputs.template-path }}
      - name: commit formula
        id: commit_formula
        working-directory: tap
        run: bash .github/workflows/scripts/commit-formula.sh
        env:
          FORMULA_PATH: ${{ steps.formula.outputs.formula-path }}
          FORMULA: ${{ inputs.formula }}
          VERSION: ${{ steps.formula.outputs.version }}
      - name: tap formula
        run: brew tap jinyongp/tap "$GITHUB_WORKSPACE/tap"
      - name: audit formula
        run: brew audit --strict "jinyongp/tap/${{ inputs.formula }}"
      - name: install formula
        run: brew install --build-from-source "jinyongp/tap/${{ inputs.formula }}"
      - name: test formula
        run: brew test "jinyongp/tap/${{ inputs.formula }}"
      - name: push formula
        if: steps.commit_formula.outputs.changed == 'true'
        working-directory: tap
        run: git push
