name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Shell syntax
        run: bash -n actions/publish/formula/generate.sh
      - name: Generate formula fixture
        uses: ./actions/publish/formula
        with:
          formula: gate
          source-repository: jinyongp/gate
          tag: v0.9.0
          description: Local-dev global HTTPS reverse proxy and port registry
          license: MIT
          main: ./cmd/gate
      - name: Validate generated formula syntax
        run: ruby -c Formula/gate.rb
