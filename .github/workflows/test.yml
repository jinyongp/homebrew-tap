name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.event.repository.default_branch }}
          path: source
      - name: Add formula spec fixture
        run: bash .github/workflows/scripts/add-formula-spec-fixture.sh
      - name: Shell syntax
        run: |
          bash -n actions/publish/formula/generate.sh
          bash -n scripts/setup-deploy-key.sh
          bash -n .github/workflows/scripts/add-formula-spec-fixture.sh
          bash -n .github/workflows/scripts/commit-formula.sh
          bash -n .github/workflows/scripts/delete-formula.sh
          bash -n .github/workflows/scripts/push-formula.sh
          bash -n .github/workflows/scripts/resolve-source-inputs.sh
      - name: Reject invalid source inputs
        run: |
          export GITHUB_OUTPUT="$RUNNER_TEMP/reject-source-repo"
          export GITHUB_REPOSITORY=owner/repo
          export INPUT_REPOSITORY=owner/repo/extra
          export INPUT_REF="$GITHUB_SHA"
          if bash .github/workflows/scripts/resolve-source-inputs.sh; then
            echo "invalid source repository should fail"
            exit 1
          fi
      - name: Generate formula fixture
        uses: ./actions/publish/formula
        with:
          tap-path: .
          source-path: source
          formula: fixture
          repository: ${{ github.repository }}
          ref: ${{ github.event.repository.default_branch }}
      - name: Delete formula fixture
        run: |
          export GITHUB_OUTPUT="$RUNNER_TEMP/delete-formula"
          export FORMULA=fixture
          export DRY_RUN=true
          bash .github/workflows/scripts/delete-formula.sh
      - name: Reject invalid delete formula inputs
        run: |
          export GITHUB_OUTPUT="$RUNNER_TEMP/reject-delete-formula"
          export FORMULA=../fixture
          export DRY_RUN=true
          if bash .github/workflows/scripts/delete-formula.sh; then
            echo "invalid formula name should fail"
            exit 1
          fi
      - name: Validate generated formula syntax
        run: ruby -c Formula/fixture.rb
      - name: Validate generated formula stanzas
        run: |
          grep -q 'def caveats' Formula/fixture.rb
          grep -q 'service do' Formula/fixture.rb
          grep -q 'livecheck do' Formula/fixture.rb
          grep -q 'conflicts_with "hello"' Formula/fixture.rb
          grep -q 'uses_from_macos "zlib" => :build, since: :sequoia' Formula/fixture.rb
      - name: Audit generated formula
        run: |
          brew tap-new jinyongp/tap
          cp Formula/fixture.rb "$(brew --repo jinyongp/tap)/Formula/fixture.rb"
          brew audit --strict jinyongp/tap/fixture
      - name: Generate class-name fixture
        uses: ./actions/publish/formula
        with:
          tap-path: .
          source-path: source
          formula: libfoo++
          repository: ${{ github.repository }}
          ref: ${{ github.event.repository.default_branch }}
      - name: Validate generated class name
        run: |
          ruby -c Formula/libfoo++.rb
          grep -q 'class Libfooxx < Formula' Formula/libfoo++.rb
      - name: Generate tag ref version fixture
        uses: ./actions/publish/formula
        with:
          tap-path: .
          source-path: source
          formula: fixture
          repository: ${{ github.repository }}
          ref: v1.2.3
      - name: Validate tag ref version normalization
        run: grep -q 'version "1.2.3"' Formula/fixture.rb
      - name: Generate explicit version fixture
        uses: ./actions/publish/formula
        with:
          tap-path: .
          source-path: source
          formula: fixture
          repository: ${{ github.repository }}
          ref: ${{ github.event.repository.default_branch }}
          version: v1.2.4
      - name: Validate explicit version normalization
        run: grep -q 'version "1.2.4"' Formula/fixture.rb
      - name: Reject invalid formula specs
        run: |
          cat > source/.github/homebrew/formula.yml <<'YAML'
          desc: Fixture formula
          license: MIT
          link_overwrite: false
          install: |
            prefix.install "README.md"
          test: |
            assert_path_exists prefix/"README.md"
          YAML
          if GITHUB_OUTPUT="$RUNNER_TEMP/reject-link-overwrite" TAP_PATH=. SOURCE_PATH=source FORMULA=fixture REPOSITORY="$GITHUB_REPOSITORY" REF="$GITHUB_SHA" SPEC_PATH=".github/homebrew/formula.yml" bash actions/publish/formula/generate.sh; then
            echo "link_overwrite: false should fail"
            exit 1
          fi

          cat > source/.github/homebrew/formula.yml <<'YAML'
          desc: Fixture formula
          license: MIT
          conflicts_with:
            - formula: fixture-conflict
              becuase: typo
          install: |
            prefix.install "README.md"
          test: |
            assert_path_exists prefix/"README.md"
          YAML
          if GITHUB_OUTPUT="$RUNNER_TEMP/reject-conflict-key" TAP_PATH=. SOURCE_PATH=source FORMULA=fixture REPOSITORY="$GITHUB_REPOSITORY" REF="$GITHUB_SHA" SPEC_PATH=".github/homebrew/formula.yml" bash actions/publish/formula/generate.sh; then
            echo "unknown nested keys should fail"
            exit 1
          fi

          cat > source/.github/homebrew/formula.yml <<'YAML'
          desc: Fixture formula
          license: MIT
          deprecate:
            date: "2026-06-03"
            because: unmaintained
            replacement: fixture-new
            replacement_formula: fixture-new
          install: |
            prefix.install "README.md"
          test: |
            assert_path_exists prefix/"README.md"
          YAML
          if GITHUB_OUTPUT="$RUNNER_TEMP/reject-replacement-keys" TAP_PATH=. SOURCE_PATH=source FORMULA=fixture REPOSITORY="$GITHUB_REPOSITORY" REF="$GITHUB_SHA" SPEC_PATH=".github/homebrew/formula.yml" bash actions/publish/formula/generate.sh; then
            echo "multiple replacement keys should fail"
            exit 1
          fi

          cat > source/.github/homebrew/formula.yml <<'YAML'
          desc: Fixture formula
          license: MIT
          disable:
            date: "2026-06-03"
            because: unsupported
            replacement: ""
          install: |
            prefix.install "README.md"
          test: |
            assert_path_exists prefix/"README.md"
          YAML
          if GITHUB_OUTPUT="$RUNNER_TEMP/reject-empty-replacement" TAP_PATH=. SOURCE_PATH=source FORMULA=fixture REPOSITORY="$GITHUB_REPOSITORY" REF="$GITHUB_SHA" SPEC_PATH=".github/homebrew/formula.yml" bash actions/publish/formula/generate.sh; then
            echo "empty replacement should fail"
            exit 1
          fi

          if GITHUB_OUTPUT="$RUNNER_TEMP/reject-class-name" TAP_PATH=. SOURCE_PATH=source FORMULA=1foo REPOSITORY="$GITHUB_REPOSITORY" REF="$GITHUB_SHA" SPEC_PATH=".github/homebrew/formula.yml" bash actions/publish/formula/generate.sh; then
            echo "invalid formula class name should fail"
            exit 1
          fi

          cat > source/.github/homebrew/formula.yml <<'YAML'
          desc: Fixture formula
          license: MIT
          dependencies:
            runtime:
              - go
            build:
              - go
          install: |
            prefix.install "README.md"
          test: |
            assert_path_exists prefix/"README.md"
          YAML
          if GITHUB_OUTPUT="$RUNNER_TEMP/reject-duplicate-dependency" TAP_PATH=. SOURCE_PATH=source FORMULA=fixture REPOSITORY="$GITHUB_REPOSITORY" REF="$GITHUB_SHA" SPEC_PATH=".github/homebrew/formula.yml" bash actions/publish/formula/generate.sh; then
            echo "duplicate dependencies should fail"
            exit 1
          fi

          cat > source/.github/homebrew/formula.yml <<'YAML'
          desc: Fixture formula
          license: MIT
          disable:
            date: 2026-06-03
            because: unsupported
          install: |
            prefix.install "README.md"
          test: |
            assert_path_exists prefix/"README.md"
          YAML
          if GITHUB_OUTPUT="$RUNNER_TEMP/reject-unquoted-date" TAP_PATH=. SOURCE_PATH=source FORMULA=fixture REPOSITORY="$GITHUB_REPOSITORY" REF="$GITHUB_SHA" SPEC_PATH=".github/homebrew/formula.yml" bash actions/publish/formula/generate.sh; then
            echo "unquoted YAML dates should fail"
            exit 1
          fi

          if GITHUB_OUTPUT="$RUNNER_TEMP/reject-repository" TAP_PATH=. SOURCE_PATH=source FORMULA=fixture REPOSITORY=owner/repo/extra REF="$GITHUB_SHA" SPEC_PATH=".github/homebrew/formula.yml" bash actions/publish/formula/generate.sh; then
            echo "invalid repository should fail"
            exit 1
          fi
